<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RAJJ</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container">
    <div class="image-section">
      <img src="assets/images/undraw_studying_re_deca.svg" alt="Ilustracao de login">
    </div>

    <div class="form-section">
      <form id="login-form">
        <div class="form-header">
          <div class="title">
            <h1>LOGIN</h1>
          </div>
          <p class="subtitle" id="login-subtitle">
            Informe seu e-mail e senha para acessar a plataforma.
          </p>
        </div>

        <div class="input-group" id="email-group">
          <div class="input-box">
            <label for="email">E-mail</label>
            <input id="email" type="email" placeholder="Digite seu e-mail" required>
          </div>
        </div>

        <div class="input-group" id="password-group">
          <div class="input-box">
            <label for="senha">Senha</label>
            <input id="senha" type="password" placeholder="Digite sua senha" required>
          </div>
        </div>

        <div class="input-group is-hidden" id="mfa-group">
          <div class="input-box">
            <label for="mfa-digit-1">Codigo MFA</label>
            <div class="mfa-code-grid" id="mfa-code-grid">
              <input id="mfa-digit-1" class="mfa-digit" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="1" aria-label="Digito 1 do codigo MFA">
              <input class="mfa-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digito 2 do codigo MFA">
              <input class="mfa-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digito 3 do codigo MFA">
              <input class="mfa-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digito 4 do codigo MFA">
              <input class="mfa-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digito 5 do codigo MFA">
              <input class="mfa-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digito 6 do codigo MFA">
            </div>
          </div>
        </div>

        <p id="auth-feedback" class="auth-feedback" aria-live="polite"></p>

        <div class="continue-button">
          <button type="submit">Entrar</button>
        </div>

        <div class="secondary-action is-hidden" id="mfa-back-wrapper">
          <button type="button" id="mfa-back-button" class="secondary-button">Voltar</button>
        </div>
      </form>

      <div class="login-link">
        <p>Nao tem conta? <a href="index.html">Cadastre-se</a></p>
      </div>
    </div>
  </div>

  <script src="assets/js/app-core.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
